<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>List Items</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .list-group { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .list-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; transition: background 150ms; border-bottom: 1px solid #f5f5f4; }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: #fff7ed; }
  .list-item.done { background: #fafaf9; }
  .check { width: 26px; height: 26px; border-radius: 9px; border: 2px solid #e7e5e4; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .check.checked { background: #f97316; border-color: #f97316; color: white; }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; color: #1c1917; }
  .item-name.crossed { color: #a8a29e; text-decoration: line-through; }
  .item-meta { font-size: 12px; color: #a8a29e; margin-top: 1px; }
  .item-qty { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #78716c; flex-shrink: 0; }
  .item-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: #f97316; flex-shrink: 0; }
  .drag-handle { color: #d6d3d1; font-size: 16px; cursor: grab; padding: 0 2px; }
  /* Swipe indicator */
  .item-urgent { border-left: 3px solid #f43f5e; }
  .item-new { border-left: 3px solid #f97316; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Shopping List Items</div>
    <div class="list-group">
      <div class="list-item item-new">
        <span class="drag-handle">⠿</span>
        <div class="check"></div>
        <div class="item-main">
          <div class="item-name">全脂牛奶</div>
          <div class="item-meta">🥛 食品 · 特選乳品</div>
        </div>
        <div class="item-qty">x2</div>
        <div class="item-price">NT$89</div>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="check"></div>
        <div class="item-main">
          <div class="item-name">雞蛋 (有機)</div>
          <div class="item-meta">🥚 食品</div>
        </div>
        <div class="item-qty">x1</div>
        <div class="item-price">NT$65</div>
      </div>
      <div class="list-item item-urgent">
        <span class="drag-handle">⠿</span>
        <div class="check"></div>
        <div class="item-main">
          <div class="item-name">洗碗精</div>
          <div class="item-meta">🧴 日用品 · 快用完了</div>
        </div>
        <div class="item-qty">x1</div>
        <div class="item-price">NT$79</div>
      </div>
      <div class="list-item done">
        <span class="drag-handle">⠿</span>
        <div class="check checked">✓</div>
        <div class="item-main">
          <div class="item-name crossed">麵包吐司</div>
          <div class="item-meta" style="color:#d6d3d1;">🍞 食品</div>
        </div>
        <div class="item-qty" style="color:#d6d3d1;">x2</div>
        <div class="item-price" style="color:#d6d3d1;">NT$55</div>
      </div>
      <div class="list-item done">
        <span class="drag-handle">⠿</span>
        <div class="check checked">✓</div>
        <div class="item-main">
          <div class="item-name crossed">番茄醬</div>
          <div class="item-meta" style="color:#d6d3d1;">🍅 料理</div>
        </div>
        <div class="item-qty" style="color:#d6d3d1;">x1</div>
        <div class="item-price" style="color:#d6d3d1;">NT$42</div>
      </div>
    </div>
  </div>
</body>
</html>
