<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radius & Shadow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  /* Radius */
  .radius-row { display: flex; gap: 10px; align-items: flex-end; }
  .rbox { background: #f97316; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; gap: 2px; }
  .rbox-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: white; }
  /* Shadow */
  .shadow-row { display: flex; gap: 14px; }
  .sbox { background: white; border-radius: 16px; width: 120px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
  .sbox-name { font-size: 11px; font-weight: 600; color: #44403c; }
  .sbox-desc { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #a8a29e; text-align: center; padding: 0 6px; line-height: 1.3; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Border Radius — 大量圓角</div>
    <div class="radius-row">
      <div class="rbox" style="width:36px;height:36px;border-radius:6px;"><div class="rbox-label">xs 6</div></div>
      <div class="rbox" style="width:44px;height:44px;border-radius:10px;"><div class="rbox-label">sm 10</div></div>
      <div class="rbox" style="width:54px;height:54px;border-radius:16px;"><div class="rbox-label">md 16</div></div>
      <div class="rbox" style="width:64px;height:64px;border-radius:20px;"><div class="rbox-label">lg 20</div></div>
      <div class="rbox" style="width:74px;height:74px;border-radius:28px;"><div class="rbox-label">xl 28</div></div>
      <div class="rbox" style="width:80px;height:80px;border-radius:36px;"><div class="rbox-label">2xl 36</div></div>
      <div class="rbox" style="width:80px;height:80px;border-radius:9999px;"><div class="rbox-label">full</div></div>
    </div>
  </div>
  <div>
    <div class="section-label">Shadow / Elevation</div>
    <div class="shadow-row">
      <div class="sbox" style="box-shadow:none;border:1px solid #e7e5e4;">
        <div class="sbox-name">Level 0</div>
        <div class="sbox-desc">Flat</div>
      </div>
      <div class="sbox" style="box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);">
        <div class="sbox-name">Level 1</div>
        <div class="sbox-desc">Cards</div>
      </div>
      <div class="sbox" style="box-shadow:0 4px 12px rgba(249,115,22,.10),0 2px 6px rgba(0,0,0,.06);">
        <div class="sbox-name">Level 2</div>
        <div class="sbox-desc">FAB / Active<br>(warm tint)</div>
      </div>
      <div class="sbox" style="box-shadow:0 12px 32px rgba(249,115,22,.15),0 4px 12px rgba(0,0,0,.08);">
        <div class="sbox-name">Level 3</div>
        <div class="sbox-desc">Modals<br>(warm bloom)</div>
      </div>
    </div>
  </div>
</body>
</html>
