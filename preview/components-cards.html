<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  /* List card */
  .list-card { background: #fff; border-radius: 20px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); width: 200px; }
  .list-card-icon { width: 44px; height: 44px; border-radius: 14px; background: #ffedd5; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
  .list-card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 700; color: #1c1917; margin-bottom: 4px; }
  .list-card-sub { font-size: 13px; color: #78716c; }
  .list-card-footer { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; }
  .pill { background: #ffedd5; color: #c2410c; font-size: 11px; font-weight: 600; border-radius: 9999px; padding: 4px 10px; }
  /* Summary card */
  .summary-card { background: #f97316; border-radius: 20px; padding: 20px; color: white; width: 220px; }
  .summary-card-label { font-size: 13px; font-weight: 500; opacity: 0.8; margin-bottom: 6px; }
  .summary-card-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
  .summary-card-sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  /* Compact card */
  .compact-card { background: #fff; border-radius: 16px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; align-items: center; gap: 12px; width: 240px; }
  .compact-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #fdba74, #f97316); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }
  .compact-body { flex: 1; min-width: 0; }
  .compact-title { font-weight: 600; font-size: 14px; color: #1c1917; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .compact-sub { font-size: 12px; color: #78716c; }
  /* Active card */
  .active-card { background: #fff; border-radius: 20px; padding: 18px; box-shadow: 0 4px 12px rgba(249,115,22,.15), 0 2px 6px rgba(0,0,0,.06); border: 2px solid #f97316; width: 200px; }
</style>
</head>
<body>
  <div>
    <div class="section-label">List Cards</div>
    <div class="row">
      <div class="list-card">
        <div class="list-card-icon">🛒</div>
        <div class="list-card-title">週末採購</div>
        <div class="list-card-sub">12 items · 3 done</div>
        <div class="list-card-footer">
          <div class="pill">Groceries</div>
          <span style="font-size:12px;color:#a8a29e;">今天</span>
        </div>
      </div>
      <div class="list-card active-card">
        <div class="list-card-icon" style="background:#fff7ed;">🏠</div>
        <div class="list-card-title">家用品</div>
        <div class="list-card-sub">8 items · 8 done</div>
        <div class="list-card-footer">
          <div class="pill">Household</div>
          <span style="font-size:12px;color:#f97316;font-weight:600;">Active</span>
        </div>
      </div>
      <div class="list-card" style="background:#1c1917;">
        <div class="list-card-icon" style="background:#292524;">🍳</div>
        <div class="list-card-title" style="color:#fff;">料理食材</div>
        <div class="list-card-sub" style="color:#78716c;">5 items</div>
        <div class="list-card-footer">
          <div class="pill" style="background:#292524;color:#fb923c;">Cooking</div>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-label">Summary &amp; Compact</div>
    <div class="row">
      <div class="summary-card">
        <div class="summary-card-label">Total Spend</div>
        <div class="summary-card-value">NT$1,248</div>
        <div class="summary-card-sub">This month · 4 lists</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="compact-card">
          <div class="compact-avatar">A</div>
          <div class="compact-body">
            <div class="compact-title">家人採購清單</div>
            <div class="compact-sub">Shared with 3 people</div>
          </div>
        </div>
        <div class="compact-card">
          <div class="compact-avatar" style="background:linear-gradient(135deg,#fda4af,#fb7185);">B</div>
          <div class="compact-body">
            <div class="compact-title">零食補貨</div>
            <div class="compact-sub">Last updated 1hr ago</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
