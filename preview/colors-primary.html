<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primary Colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 64px; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
  .swatch-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 400; }
  .swatch-name { font-size: 10px; font-weight: 500; margin-bottom: 1px; }
  .light { color: #292524; }
  .dark { color: rgba(255,255,255,0.85); }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="section-label">Primary — Orange Scale</div>
<div class="row">
  <div class="swatch light" style="background:#fff7ed"><div class="swatch-name">50</div><div class="swatch-label">#fff7ed</div></div>
  <div class="swatch light" style="background:#ffedd5"><div class="swatch-name">100</div><div class="swatch-label">#ffedd5</div></div>
  <div class="swatch light" style="background:#fed7aa"><div class="swatch-name">200</div><div class="swatch-label">#fed7aa</div></div>
  <div class="swatch light" style="background:#fdba74"><div class="swatch-name">300</div><div class="swatch-label">#fdba74</div></div>
  <div class="swatch light" style="background:#fb923c"><div class="swatch-name">400</div><div class="swatch-label">#fb923c</div></div>
  <div class="swatch dark" style="background:#f97316"><div class="swatch-name">500 ★</div><div class="swatch-label">#f97316</div></div>
  <div class="swatch dark" style="background:#ea580c"><div class="swatch-name">600</div><div class="swatch-label">#ea580c</div></div>
  <div class="swatch dark" style="background:#c2410c"><div class="swatch-name">700</div><div class="swatch-label">#c2410c</div></div>
  <div class="swatch dark" style="background:#9a3412"><div class="swatch-name">800</div><div class="swatch-label">#9a3412</div></div>
  <div class="swatch dark" style="background:#7c2d12"><div class="swatch-name">900</div><div class="swatch-label">#7c2d12</div></div>
</div>
</body>
</html>
