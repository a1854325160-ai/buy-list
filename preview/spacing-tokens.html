<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing Tokens</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; }
  .grid { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar-wrap { flex: 1; height: 20px; display: flex; align-items: center; }
  .bar { height: 14px; background: #f97316; border-radius: 3px; opacity: 0.85; }
  .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #78716c; width: 80px; flex-shrink: 0; }
  .val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #a8a29e; width: 32px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>
<div class="grid">
  <div class="row"><div class="label">--space-1</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><div class="val">4px</div></div>
  <div class="row"><div class="label">--space-2</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><div class="val">8px</div></div>
  <div class="row"><div class="label">--space-3</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><div class="val">12px</div></div>
  <div class="row"><div class="label">--space-4</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><div class="val">16px</div></div>
  <div class="row"><div class="label">--space-5</div><div class="bar-wrap"><div class="bar" style="width:20px"></div></div><div class="val">20px</div></div>
  <div class="row"><div class="label">--space-6</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><div class="val">24px</div></div>
  <div class="row"><div class="label">--space-8</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><div class="val">32px</div></div>
  <div class="row"><div class="label">--space-10</div><div class="bar-wrap"><div class="bar" style="width:40px"></div></div><div class="val">40px</div></div>
  <div class="row"><div class="label">--space-12</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><div class="val">48px</div></div>
  <div class="row"><div class="label">--space-16</div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><div class="val">64px</div></div>
  <div class="row"><div class="label">--space-20</div><div class="bar-wrap"><div class="bar" style="width:80px"></div></div><div class="val">80px</div></div>
  <div class="row"><div class="label">--space-24</div><div class="bar-wrap"><div class="bar" style="width:96px"></div></div><div class="val">96px</div></div>
</div>
</body>
</html>
