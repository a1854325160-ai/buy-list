<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accent Colors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 56px; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
  .swatch-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .swatch-name { font-size: 10px; font-weight: 500; margin-bottom: 1px; }
  .light { color: #292524; }
  .dark { color: rgba(255,255,255,0.9); }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div>
  <div class="section-label">Accent — Coral / Rose</div>
  <div class="row">
    <div class="swatch light" style="background:#fff1f2"><div class="swatch-name">50</div><div class="swatch-label">#fff1f2</div></div>
    <div class="swatch light" style="background:#ffe4e6"><div class="swatch-name">100</div><div class="swatch-label">#ffe4e6</div></div>
    <div class="swatch light" style="background:#fecdd3"><div class="swatch-name">200</div><div class="swatch-label">#fecdd3</div></div>
    <div class="swatch light" style="background:#fda4af"><div class="swatch-name">300</div><div class="swatch-label">#fda4af</div></div>
    <div class="swatch dark" style="background:#fb7185"><div class="swatch-name">400 ★</div><div class="swatch-label">#fb7185</div></div>
    <div class="swatch dark" style="background:#f43f5e"><div class="swatch-name">500</div><div class="swatch-label">#f43f5e</div></div>
    <div class="swatch dark" style="background:#e11d48"><div class="swatch-name">600</div><div class="swatch-label">#e11d48</div></div>
    <div class="swatch dark" style="background:#be123c"><div class="swatch-name">700</div><div class="swatch-label">#be123c</div></div>
  </div>
</div>
<div>
  <div class="section-label">Amber — Warm Yellow</div>
  <div class="row">
    <div class="swatch light" style="background:#fffbeb"><div class="swatch-name">50</div><div class="swatch-label">#fffbeb</div></div>
    <div class="swatch light" style="background:#fef3c7"><div class="swatch-name">100</div><div class="swatch-label">#fef3c7</div></div>
    <div class="swatch light" style="background:#fde68a"><div class="swatch-name">200</div><div class="swatch-label">#fde68a</div></div>
    <div class="swatch light" style="background:#fcd34d"><div class="swatch-name">300</div><div class="swatch-label">#fcd34d</div></div>
    <div class="swatch light" style="background:#fbbf24"><div class="swatch-name">400</div><div class="swatch-label">#fbbf24</div></div>
    <div class="swatch dark" style="background:#f59e0b"><div class="swatch-name">500 ★</div><div class="swatch-label">#f59e0b</div></div>
    <div class="swatch dark" style="background:#d97706"><div class="swatch-name">600</div><div class="swatch-label">#d97706</div></div>
    <div class="swatch dark" style="background:#b45309"><div class="swatch-name">700</div><div class="swatch-label">#b45309</div></div>
  </div>
</div>
</body>
</html>
