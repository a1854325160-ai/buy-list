<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutral Colors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 64px; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; border: 1px solid rgba(0,0,0,0.04); }
  .swatch-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .swatch-name { font-size: 10px; font-weight: 500; margin-bottom: 1px; }
  .light { color: #292524; }
  .dark { color: rgba(255,255,255,0.85); }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="section-label">Neutral — Warm Stone Scale</div>
<div class="row">
  <div class="swatch light" style="background:#ffffff"><div class="swatch-name">0</div><div class="swatch-label">#ffffff</div></div>
  <div class="swatch light" style="background:#fafaf9"><div class="swatch-name">50</div><div class="swatch-label">#fafaf9</div></div>
  <div class="swatch light" style="background:#f5f5f4"><div class="swatch-name">100</div><div class="swatch-label">#f5f5f4</div></div>
  <div class="swatch light" style="background:#e7e5e4"><div class="swatch-name">200</div><div class="swatch-label">#e7e5e4</div></div>
  <div class="swatch light" style="background:#d6d3d1"><div class="swatch-name">300</div><div class="swatch-label">#d6d3d1</div></div>
  <div class="swatch light" style="background:#a8a29e"><div class="swatch-name">400</div><div class="swatch-label">#a8a29e</div></div>
  <div class="swatch dark" style="background:#78716c"><div class="swatch-name">500</div><div class="swatch-label">#78716c</div></div>
  <div class="swatch dark" style="background:#57534e"><div class="swatch-name">600</div><div class="swatch-label">#57534e</div></div>
  <div class="swatch dark" style="background:#44403c"><div class="swatch-name">700</div><div class="swatch-label">#44403c</div></div>
  <div class="swatch dark" style="background:#292524"><div class="swatch-name">800</div><div class="swatch-label">#292524</div></div>
  <div class="swatch dark" style="background:#1c1917"><div class="swatch-name">900</div><div class="swatch-label">#1c1917</div></div>
</div>
</body>
</html>
