<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  /* Base button */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-family: 'DM Sans', sans-serif; font-weight: 600; border: none; cursor: pointer; transition: all 200ms cubic-bezier(0.4,0,0.2,1); }
  /* Variants */
  .btn-primary { background: #f97316; color: #fff; border-radius: 9999px; padding: 12px 24px; font-size: 15px; box-shadow: 0 4px 12px rgba(249,115,22,.25); }
  .btn-primary:hover { background: #ea580c; transform: scale(1.02); }
  .btn-secondary { background: #ffedd5; color: #c2410c; border-radius: 9999px; padding: 12px 24px; font-size: 15px; }
  .btn-secondary:hover { background: #fed7aa; }
  .btn-outline { background: transparent; color: #f97316; border: 2px solid #f97316; border-radius: 9999px; padding: 11px 22px; font-size: 15px; }
  .btn-outline:hover { background: #fff7ed; }
  .btn-ghost { background: transparent; color: #78716c; border-radius: 9999px; padding: 11px 20px; font-size: 15px; }
  .btn-ghost:hover { background: #f5f5f4; color: #1c1917; }
  .btn-danger { background: #f43f5e; color: #fff; border-radius: 9999px; padding: 12px 24px; font-size: 15px; }
  /* Sizes */
  .btn-lg { padding: 14px 28px; font-size: 17px; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-xs { padding: 5px 12px; font-size: 12px; }
  /* Icon button */
  .btn-icon { width: 44px; height: 44px; border-radius: 50%; background: #f97316; color: #fff; font-size: 20px; padding: 0; }
  .btn-icon-ghost { width: 44px; height: 44px; border-radius: 50%; background: #ffedd5; color: #f97316; font-size: 20px; padding: 0; }
  /* Disabled */
  .btn-disabled { background: #e7e5e4; color: #a8a29e; border-radius: 9999px; padding: 12px 24px; font-size: 15px; cursor: not-allowed; }
  /* Square-ish */
  .btn-rounded { background: #f97316; color: #fff; border-radius: 16px; padding: 12px 22px; font-size: 15px; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Variants</div>
    <div class="row">
      <button class="btn btn-primary">Start Shopping</button>
      <button class="btn btn-secondary">View List</button>
      <button class="btn btn-outline">Share List</button>
      <button class="btn btn-ghost">Cancel</button>
      <button class="btn btn-danger">Delete</button>
    </div>
  </div>
  <div>
    <div class="section-label">Sizes</div>
    <div class="row">
      <button class="btn btn-primary btn-lg">Large</button>
      <button class="btn btn-primary">Default</button>
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary btn-xs">XSmall</button>
    </div>
  </div>
  <div>
    <div class="section-label">Icon Buttons &amp; Rounded</div>
    <div class="row">
      <button class="btn btn-icon">+</button>
      <button class="btn btn-icon-ghost">✓</button>
      <button class="btn btn-rounded">開始購物</button>
      <button class="btn btn-disabled" disabled>Unavailable</button>
    </div>
  </div>
</body>
</html>
