<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic Colors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fff7ed; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; }
  .chip { flex: 1; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
  .chip-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .chip-text { display: flex; flex-direction: column; }
  .chip-name { font-size: 12px; font-weight: 600; }
  .chip-hex { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; }
  .section-label { font-size: 11px; font-weight: 500; color: #78716c; margin-bottom: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="section-label">Semantic States</div>
<div class="row">
  <div class="chip" style="background:#f0fdf4; color:#15803d;">
    <div class="chip-icon" style="background:#dcfce7;">✓</div>
    <div class="chip-text"><div class="chip-name">Success</div><div class="chip-hex">#22c55e</div></div>
  </div>
  <div class="chip" style="background:#fffbeb; color:#b45309;">
    <div class="chip-icon" style="background:#fef3c7;">!</div>
    <div class="chip-text"><div class="chip-name">Warning</div><div class="chip-hex">#f59e0b</div></div>
  </div>
  <div class="chip" style="background:#fff1f2; color:#be123c;">
    <div class="chip-icon" style="background:#ffe4e6;">✕</div>
    <div class="chip-text"><div class="chip-name">Error</div><div class="chip-hex">#f43f5e</div></div>
  </div>
  <div class="chip" style="background:#eef2ff; color:#4f46e5;">
    <div class="chip-icon" style="background:#e0e7ff;">i</div>
    <div class="chip-text"><div class="chip-name">Info</div><div class="chip-hex">#6366f1</div></div>
  </div>
</div>
<div class="section-label" style="margin-top:4px;">Surface Tokens</div>
<div class="row">
  <div class="chip" style="background:#fff7ed; border: 1px solid #fed7aa; color:#78716c;">
    <div class="chip-text"><div class="chip-name">bg-app</div><div class="chip-hex">#fff7ed</div></div>
  </div>
  <div class="chip" style="background:#ffffff; border: 1px solid #e7e5e4; color:#78716c;">
    <div class="chip-text"><div class="chip-name">bg-surface</div><div class="chip-hex">#ffffff</div></div>
  </div>
  <div class="chip" style="background:#ffedd5; border: 1px solid #fdba74; color:#9a3412;">
    <div class="chip-text"><div class="chip-name">bg-accent</div><div class="chip-hex">#ffedd5</div></div>
  </div>
  <div class="chip" style="background:#f5f5f4; border: 1px solid #e7e5e4; color:#78716c;">
    <div class="chip-text"><div class="chip-name">bg-muted</div><div class="chip-hex">#f5f5f4</div></div>
  </div>
</div>
</body>
</html>
